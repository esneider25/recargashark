<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecargaShark Admin 🦈</title>
  <link rel="stylesheet" href="css/styles.css?v=5">
  <link rel="stylesheet" href="css/admin.css?v=18">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="img/favicon-192.png">
  <link rel="manifest" href="admin-manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Security Module -->
  <script src="js/security.js?v=1"></script>
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-ocean-grid"></div>
  <div class="bubble" style="width: 120px; height: 120px; left: 10%; animation-duration: 15s; animation-delay: 0s;"></div>
  <div class="bubble" style="width: 80px; height: 80px; left: 85%; animation-duration: 22s; animation-delay: 5s;"></div>
  
  <div id="admin-app"></div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="js/firebase-init.js?v=2"></script>
  
  <script src="js/data.js?v=48"></script>
  <script src="js/components.js?v=20"></script>
  <script src="js/app.js?v=49"></script>
  <script src="js/admin.js?v=49"></script>

  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, err => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
</body>
</html>
