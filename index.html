<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="RecargaShark — Tu tienda digital todo en un solo lugar. Recargas de videojuegos, gift cards, streaming y billeteras digitales en Venezuela. Pago Móvil, transferencia y Binance.">
  <meta name="keywords" content="recargas, videojuegos, diamantes, Free Fire, PUBG, Roblox, gift cards, Netflix, Spotify, Venezuela, pago móvil, Binance">
  <meta name="author" content="RecargaShark">
  <meta name="theme-color" content="#060d1a">
  <title>RecargaShark 🦈 — Tu Tienda Digital</title>
  <!-- Favicon & PWA -->
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="img/favicon-192.png">
  <link rel="manifest" href="manifest.json">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css?v=6.0">
</head>
<body>
  
  <!-- App Root -->
  <div id="app"></div>
  <!-- Scripts (order matters: data → components → app) -->
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="js/firebase-init.js?v=2"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="js/data.js?v=19"></script>
  <script src="js/components.js?v=19"></script>
  <script src="js/app.js?v=19"></script>
  
  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, err => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
</body>
