<!DOCTYPE html>
<html>
<head>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
  <div id="output">Loading...</div>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyB6ePqcFMsY_Z7zJAt2kh-mCrEqyp3M0e4",
      databaseURL: "https://recargashark-default-rtdb.firebaseio.com",
      projectId: "recargashark"
    });
    
    const db = firebase.database();
    const order = { id: "ORD-TEST-123", status: "pending", createdAt: new Date().toISOString() };
    
    const out = document.getElementById("output");
    out.innerText = "Attempting to save to orders/ORD-TEST-123...";
    
    db.ref('orders/' + order.id).set(order)
      .then(() => {
        out.innerText = "SUCCESSFULLY SAVED ORDER!";
        console.log("SUCCESSFULLY SAVED ORDER!");
      })
      .catch(err => {
        out.innerText = "ERROR SAVING ORDER: " + err.message;
        console.error("ERROR SAVING ORDER:", err);
      });
  </script>
</body>
</html>
