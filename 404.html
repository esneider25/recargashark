<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — RecargaShark</title>
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="img/favicon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg-deep);
      color: var(--text-primary);
      text-align: center;
      padding: 20px;
    }
    .error-container {
      background: var(--bg-surface);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      max-width: 500px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .error-code {
      font-size: 6rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--coral));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      line-height: 1;
    }
    .error-img {
      width: 150px;
      margin: 20px auto;
      filter: drop-shadow(0 0 15px rgba(0, 229, 195, 0.4));
    }
    .error-title {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }
    .error-desc {
      color: var(--text-secondary);
      margin-bottom: 30px;
    }
    .btn-home {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      color: var(--bg-deep);
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 229, 195, 0.4);
    }
  </style>
</head>
<body>
  <div class="error-container">
    <h1 class="error-code">404</h1>
    <img src="img/logo.png" alt="RecargaShark Logo" class="error-img">
    <h2 class="error-title">¡Ups! Página no encontrada</h2>
    <p class="error-desc">El tiburón de RecargaShark no pudo encontrar la página que buscas. Es posible que haya sido movida o eliminada.</p>
    <a href="/" class="btn-home">🦈 Volver a la Tienda</a>
  </div>
</body>
</html>
